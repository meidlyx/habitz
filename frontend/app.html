<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Habitz</title>
    <link rel="stylesheet" href="styles/fonts.css" />
    <link rel="stylesheet" href="styles/base.css" />
    <link rel="stylesheet" href="styles/components/app.css" />
  </head>
  <body>
    <!-- ТОПБАР -->
    <header class="topbar">
      <div class="topbar-inner container">
        <h1 class="topbar-logo">Habitz</h1>
        <nav class="topbar-nav">
          <button type="button" class="nav-btn active" data-page="main">
            Главная
          </button>
          <button type="button" class="nav-btn" data-page="tasks">
            Задачи
          </button>
          <button type="button" class="nav-btn" data-page="profile">
            Профиль
          </button>
          <button type="button" class="nav-btn" data-page="settings">
            Настройки
          </button>
        </nav>
      </div>
    </header>

    <!-- СТРАНИЦЫ -->
    <main class="main-content">
      <div class="container">
        <!-- ГЛАВНАЯ -->
        <div class="page active" id="page-main">
          <div class="greeting">
            <h2 id="greeting-text">Привет!</h2>
            <p id="greeting-date"></p>
          </div>

          <div class="streak-row" id="streak-row"></div>

          <div class="section">
            <div class="section-header">
              <h3>Привычки на сегодня</h3>
              <button type="button" class="btn-add" id="btn-add-habit">
                + Добавить
              </button>
            </div>
            <div id="habits-list"></div>
          </div>

          <div class="section" id="done-habits-section">
            <h3>Пройдены</h3>
            <div id="habits-done-list"></div>
          </div>
        </div>

        <!-- ЗАДАЧИ -->
        <div class="page" id="page-tasks">
          <h2>Задачи</h2>
          <p class="page-sub">Разовые дела</p>

          <div class="task-add-row">
            <input type="text" id="task-input" placeholder="Новая задача..." />
            <button type="button" class="btn-icon" id="btn-add-task">+</button>
          </div>

          <div class="section">
            <h3>Активные</h3>
            <div id="tasks-list"></div>
          </div>

          <div class="section">
            <h3>Пройдены</h3>
            <div id="tasks-done-list"></div>
          </div>
        </div>

        <!-- ПРОФИЛЬ -->
        <div class="page" id="page-profile">
          <h2>Профиль</h2>
          <div id="profile-content"></div>
        </div>

        <!-- НАСТРОЙКИ -->
        <div class="page" id="page-settings">
          <h2>Настройки</h2>
          <div id="settings-content"></div>
        </div>
      </div>
    </main>

    <!-- МОДАЛКА ДОБАВЛЕНИЯ ПРИВЫЧКИ -->
    <div class="modal-overlay hidden" id="modal-habit">
      <div class="modal">
        <div class="modal-header">
          <h3>Добавить привычку</h3>
          <button type="button" class="modal-close" id="modal-habit-close">
            ✕
          </button>
        </div>
        <div class="modal-body">
          <input type="text" id="habit-title" placeholder="Название" />
          <p class="field-label">Сложность</p>
          <div class="difficulty-row">
            <button type="button" class="diff-btn active" data-diff="easy">
              Лёгкая (+10 XP)
            </button>
            <button type="button" class="diff-btn" data-diff="medium">
              Средняя (+20 XP)
            </button>
            <button type="button" class="diff-btn" data-diff="hard">
              Сложная (+30 XP)
            </button>
          </div>
          <p class="field-label">Дни недели</p>
          <div class="days-row" id="days-row">
            <button type="button" class="day-btn active" data-day="1">
              Пн
            </button>
            <button type="button" class="day-btn active" data-day="2">
              Вт
            </button>
            <button type="button" class="day-btn active" data-day="3">
              Ср
            </button>
            <button type="button" class="day-btn active" data-day="4">
              Чт
            </button>
            <button type="button" class="day-btn active" data-day="5">
              Пт
            </button>
            <button type="button" class="day-btn active" data-day="6">
              Сб
            </button>
            <button type="button" class="day-btn active" data-day="0">
              Вс
            </button>
          </div>
          <p class="field-label">Описание (необязательно)</p>
          <textarea
            id="habit-desc"
            placeholder="Зачем мне эта привычка..."
          ></textarea>
          <button type="button" class="btn-primary" id="btn-save-habit">
            Добавить привычку
          </button>
        </div>
      </div>
    </div>

    <!-- МОДАЛКА ДЕТАЛЕЙ ПРИВЫЧКИ -->
    <div class="modal-overlay hidden" id="modal-habit-detail">
      <div class="modal">
        <div class="modal-header">
          <h3 id="detail-title">Привычка</h3>
          <button type="button" class="modal-close" id="modal-detail-close">
            ✕
          </button>
        </div>
        <div class="modal-body">
          <div class="detail-row">
            <span class="detail-label">Сложность</span>
            <span id="detail-difficulty" class="detail-value"></span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Опыт</span>
            <span id="detail-xp" class="detail-value"></span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Частота</span>
            <span id="detail-frequency" class="detail-value"></span>
          </div>
          <div class="detail-row" id="detail-desc-row">
            <span class="detail-label">Описание</span>
            <span id="detail-desc" class="detail-value"></span>
          </div>
        </div>
      </div>
    </div>
